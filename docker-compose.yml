version: '3.8'

services:
  crm-serralheria:
    image: emaildoissa/crm-serralheria:latest
    container_name: crm-serralheria
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.crm.rule=Host(`crm-serralheria.automacao.free.nf`)
      - traefik.http.routers.crm.entrypoints=websecure
      - traefik.http.routers.crm.tls=true
      - traefik.http.routers.crm.tls.certresolver=letsencrypt
      - traefik.http.routers.crm.middlewares=crm-cors@docker
      - traefik.http.middlewares.crm-cors.headers.accesscontrolalloworiginlist=https://crm-serralheria.vercel.app
      - traefik.http.middlewares.crm-cors.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,OPTIONS
      - traefik.http.middlewares.crm-cors.headers.accesscontrolallowheaders=*
      - traefik.http.middlewares.crm-cors.headers.accesscontrolmaxage=86400
    environment:
      PORT: '5000'
      NODE_ENV: 'production'
      DB_HOST: 'postgres'
      DB_PORT: '5432'
      DB_USER: 'postgres'
      DB_PASSWORD: 'd0087a71c66d48299a745888cd44b665'
      DB_DATABASE: 'crm_serralheria'
      DB_SSL: 'false'
      N8N_WEBHOOK_URL: 'https://webhook.automacao.free.nf/webhook/4152c9b1-d554-4d39-918a-7b4a23a522f3'
      N8N_ANALYZE_WEBHOOK_URL: 'https://webhook.automacao.free.nf/webhook/analyze-lead'
      EVOLUTION_API_KEY: '52397EAD055D-481F-8911-3F06BCC5D370'
      EVOLUTION_INSTANCE: 'celularteste'
      FRONTEND_URL: 'https://crm-serralheria.vercel.app'
    networks:
      - interna

networks:
  interna:
    external: true
    name: interna
